name: release

# Tag a release to build, sign, and publish the desktop app + the updater manifest.
#   git tag app-v0.1.1 && git push origin app-v0.1.1
# The app's updater polls the published latest.json and self-updates.
on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing key (set these in repo Settings → Secrets and variables → Actions):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Optional Apple notarization/signing (Gatekeeper-clean downloads):
          # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY /
          # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
        with:
          projectPath: apps/web
          tagName: ${{ github.ref_name }}
          releaseName: "Chirp ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install. The app auto-updates from here."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
