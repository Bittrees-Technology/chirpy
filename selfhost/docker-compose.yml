# Self-hosted Chirpy gate. The `gate` service runs the XMTP gatekeeper room-join handler
# (selfhost/gate-server.mjs) — the same logic the Vercel deployment uses, but in an
# always-on container that supports @xmtp/node-sdk's native bindings.
#
# Point an org's OrgConfig.gateUrl at  http(s)://<your-host>/api/room-join
services:
  gate:
    build:
      context: ..
      dockerfile: selfhost/gate.Dockerfile
    env_file: ./gate.env
    ports:
      - "${GATE_PORT:-8788}:8788"
    restart: unless-stopped
