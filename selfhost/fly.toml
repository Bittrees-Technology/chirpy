# Fly.io config for the Chirpy gatekeeper gate.
# Deploy from the REPO ROOT (the Dockerfile copies packages/core + api/ from there):
#
#   fly launch --no-deploy --copy-config --config selfhost/fly.toml      # first time; pick a unique app name
#   fly secrets set --config selfhost/fly.toml \
#       XMTP_GATEKEEPER_PRIVATE_KEY=0x... \
#       MAINNET_RPC_URL=https://... \
#       GATE_ALLOW_ORIGIN=https://chirpy.bittrees.org
#   fly deploy --config selfhost/fly.toml --dockerfile selfhost/gate.Dockerfile
#
# `fly deploy` uses the current directory (repo root) as the build context, so the
# Dockerfile's `COPY packages/core` / `COPY api/room-join.js` resolve correctly.

app = "chirpy-gate"          # change to your unique Fly app name
primary_region = "iad"

[build]
  dockerfile = "selfhost/gate.Dockerfile"

[env]
  GATE_PORT = "8788"
  # XMTP_GATEKEEPER_PRIVATE_KEY, MAINNET_RPC_URL, GATE_ALLOW_ORIGIN → set via `fly secrets set`.

[http_service]
  internal_port = 8788
  force_https = true
  auto_stop_machines = false   # keep the gatekeeper's XMTP client warm; don't scale to zero
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
